name: Run Block Letter Bot

on:
  workflow_dispatch:
    inputs:
      source_channel:
        description: 'Channel to fetch images from'
        default: 'image-gen'
      post_channel:
        description: 'Channel to post results to'
        default: 'img-junkyard'
      font_size:
        description: 'Letter height in pixels (default 200)'
        default: '200'
      depth:
        description: 'Extrusion depth in pixels (default 70)'
        default: '70'
      angle:
        description: 'Isometric angle in degrees (default 30)'
        default: '30'
      text_channel:
        description: 'Slack channel to fetch song titles from (default: song-titles)'
        default: 'song-titles'
      custom_text:
        description: 'Manual text to use instead of scraping (leave blank to use song-titles)'
        default: ''
      font:
        description: 'Font to use (leave as random to pick automatically)'
        default: 'random'
        type: choice
        options:
          - random
          - Liberation Sans Bold
          - Liberation Serif Bold
          - DejaVu Sans Bold
          - DejaVu Serif Bold
          - FreeSans Bold
          - FreeSerif Bold
          - Ubuntu Bold
          - Open Sans Bold
          - Lato Bold
          - Lato Black
          - Arimo Bold
          - Tinos Bold
          - Cousine Bold
          - Carlito Bold
          - Caladea Bold
          - Roboto Bold
          - Roboto Black
          - Anton
          - Alfa Slab One
          - Bangers
          - Black Ops One
          - Boogaloo
          - Lobster
          - Pacifico
          - Righteous
          - Russo One
          - Squada One
      max_chars:
        description: 'Max characters per wrapped line (default 15)'
        default: '15'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get install -y fonts-liberation fonts-dejavu-core fonts-freefont-ttf fonts-ubuntu \
            fonts-open-sans fonts-lato fonts-croscore fonts-crosextra-carlito \
            fonts-crosextra-caladea fonts-roboto-unhinted

      - name: Run block letter bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python block_letter_bot.py \
            --source-channel "${{ inputs.source_channel }}" \
            --post-channel "${{ inputs.post_channel }}" \
            --font-size "${{ inputs.font_size }}" \
            --depth "${{ inputs.depth }}" \
            --angle "${{ inputs.angle }}" \
            --text-channel "${{ inputs.text_channel }}" \
            --custom-text "${{ inputs.custom_text }}" \
            --font-name "${{ inputs.font }}" \
            --max-chars "${{ inputs.max_chars }}"
