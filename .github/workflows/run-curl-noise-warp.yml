name: Run Curl Noise Warp Bot

on:
  workflow_dispatch:
    inputs:
      source_channel:
        description: 'Channel to fetch images from'
        default: 'image-gen'
      post_channel:
        description: 'Channel to post results to'
        default: 'img-junkyard'
      strength:
        description: 'Maximum displacement in pixels (default 120)'
        default: '120'
      scale:
        description: 'Broadest noise octave as fraction of short image dimension (default 0.20)'
        default: '0.20'
      octaves:
        description: 'fBm octaves; more = finer swirl detail (default 4)'
        default: '4'
      seed:
        description: 'Random seed (leave blank for a different result each run)'
        default: ''
      tile:
        description: 'Wrap source at boundaries instead of clamping to edge colour'
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run curl noise warp bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python curl_noise_warp_bot.py \
            --source-channel "${{ inputs.source_channel }}" \
            --post-channel "${{ inputs.post_channel }}" \
            --strength "${{ inputs.strength }}" \
            --scale "${{ inputs.scale }}" \
            --octaves "${{ inputs.octaves }}" \
            ${{ inputs.seed != '' && format('--seed "{0}"', inputs.seed) || '' }} \
            ${{ inputs.tile && '--tile' || '' }}
