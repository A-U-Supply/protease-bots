name: Run Iterative Warp Bot

on:
  workflow_dispatch:
    inputs:
      source_channel:
        description: 'Channel to fetch images from'
        default: 'image-gen'
      post_channel:
        description: 'Channel to post results to'
        default: 'img-junkyard'
      scale:
        description: 'Self-similarity scale factor (Escher: 256)'
        default: '256'
      iterations:
        description: 'Number of warp passes'
        default: '4'
      tile:
        description: 'Tile source as Cartesian grid before warping'
        type: boolean
        default: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run iterative warp bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python iterative_warp_bot.py \
            --source-channel "${{ inputs.source_channel }}" \
            --post-channel "${{ inputs.post_channel }}" \
            --scale "${{ inputs.scale }}" \
            --iterations "${{ inputs.iterations }}" \
            ${{ inputs.tile && '--tile' || '' }}
