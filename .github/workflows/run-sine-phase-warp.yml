name: Run Sine Phase Warp Bot

on:
  workflow_dispatch:
    inputs:
      source_channel:
        description: 'Channel to fetch images from'
        default: 'image-gen'
      post_channel:
        description: 'Channel to post results to'
        default: 'img-junkyard'
      frequency:
        description: 'Sine cycles across the image (default 1.0)'
        default: '1.0'
      phase:
        description: 'Real phase offset in radians (default pi/2 ≈ 1.5708)'
        default: '1.5708'
      phase_imag:
        description: 'Imaginary phase offset; shifts vertical blow-up (default 0.5)'
        default: '0.5'
      tile:
        description: 'Tile source as Cartesian grid before warping'
        type: boolean
        default: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sine phase warp bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python sine_phase_warp_bot.py \
            --source-channel "${{ inputs.source_channel }}" \
            --post-channel "${{ inputs.post_channel }}" \
            --frequency "${{ inputs.frequency }}" \
            --phase "${{ inputs.phase }}" \
            --phase-imag "${{ inputs.phase_imag }}" \
            ${{ inputs.tile && '--tile' || '' }}
